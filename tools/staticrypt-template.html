  <style>
    :root {
      --bg: #EFEAE0;
      --paper: #F7F3EA;
      --ink: #1A1612;
      --ink-soft: #5C544A;
      --accent: #3D5240;
      --accent-soft: #DAE2D9;
      --accent-deep: #2A3B2D;
      --line: #D4CCBC;
      --line-soft: #E2DBCC;
      --muted: #8C8377;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hidden { display: none !important; }

    /* ── loading spinner ── */
    .staticrypt-spinner-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .staticrypt-spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--line);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ── card ── */
    .staticrypt-card {
      width: 100%;
      max-width: 440px;
      background: var(--paper);
      border: 0.5pt solid var(--line);
      border-radius: 8px;
      padding: 36px 36px 28px;
      box-shadow: 0 1px 3px rgba(26,22,18,0.04);
      position: relative;
    }

    /* ── lockup ── */
    .lockup {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .cresco-mark {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 18px;
      letter-spacing: -0.025em;
      color: var(--ink);
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      line-height: 1;
    }
    .cresco-mark em {
      font-style: normal;
      color: var(--accent);
      margin-left: -2px;
    }
    .lockup .x {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .kenco-mark {
      display: inline-flex;
      align-items: center;
      height: 30px;
    }
    .kenco-mark svg { height: 30px; width: auto; display: block; shape-rendering: geometricPrecision; }
    .kenco-mark svg path { fill: var(--ink); }
    .kenco-mark svg path:last-child { fill: var(--accent); }

    /* ── eyebrow + title ── */
    .eyebrow {
      font-family: var(--sans);
      font-style: italic;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: -0.005em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .eyebrow::before {
      content: "";
      width: 18px;
      height: 0.5pt;
      background: var(--accent);
    }
    .staticrypt-title {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 26px;
      letter-spacing: -0.025em;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .staticrypt-subtitle {
      font-family: var(--sans);
      font-style: italic;
      font-size: 13px;
      line-height: 1.5;
      color: var(--ink-soft);
      margin-bottom: 22px;
    }

    .divider {
      height: 0.5pt;
      background: var(--line);
      margin: 0 0 22px;
    }

    /* ── input ── */
    .field-label {
      font-family: var(--sans);
      font-style: italic;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: -0.005em;
      display: block;
      margin-bottom: 8px;
    }
    .staticrypt-password-container {
      position: relative;
      background: var(--bg);
      border: 0.5pt solid var(--line);
      border-radius: 4px;
      margin-bottom: 14px;
      transition: border-color 120ms ease;
    }
    .staticrypt-password-container:focus-within {
      border-color: var(--accent);
    }
    .staticrypt-password-container input[type="password"],
    .staticrypt-password-container input[type="text"] {
      background: transparent;
      border: 0;
      width: 100%;
      padding: 13px 44px 13px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink);
      outline: 0;
      letter-spacing: 0.02em;
    }
    /* iOS Safari hace auto-zoom si el input tiene font-size < 16px */
    @media (max-width: 768px) {
      .staticrypt-password-container input[type="password"],
      .staticrypt-password-container input[type="text"] {
        font-size: 16px;
        padding: 14px 48px 14px 14px;
      }
    }
    .staticrypt-password-container input::placeholder {
      color: var(--muted);
      font-family: var(--sans);
      font-style: italic;
      letter-spacing: 0;
    }
    .staticrypt-toggle-password-visibility {
      cursor: pointer;
      width: 18px;
      height: 18px;
      opacity: 0.55;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      transition: opacity 120ms ease;
    }
    .staticrypt-toggle-password-visibility:hover { opacity: 1; }

    /* ── remember ── */
    .staticrypt-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-style: italic;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: -0.005em;
      margin-bottom: 18px;
      cursor: pointer;
      user-select: none;
    }
    .staticrypt-remember input[type="checkbox"] {
      appearance: none;
      width: 13px;
      height: 13px;
      border: 0.5pt solid var(--line);
      border-radius: 2px;
      background: var(--bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 120ms ease;
    }
    .staticrypt-remember input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .staticrypt-remember input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 3.5px;
      top: 0.5px;
      width: 4px;
      height: 8px;
      border: solid var(--bg);
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    /* ── submit button ── */
    .staticrypt-decrypt-button {
      width: 100%;
      padding: 13px 16px;
      background: var(--accent);
      color: var(--bg);
      border: 0;
      border-radius: 4px;
      font-family: var(--sans);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .staticrypt-decrypt-button:hover {
      background: var(--accent-deep);
    }
    .staticrypt-decrypt-button:focus-visible {
      outline: 1.5px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── error ── */
    .staticrypt-error {
      color: #8a3a2c;
      font-family: var(--sans);
      font-style: italic;
      font-size: 12px;
      letter-spacing: -0.005em;
      margin-top: 12px;
      text-align: center;
      min-height: 14px;
    }

    /* ── footer meta ── */
    .meta {
      margin-top: 26px;
      padding-top: 16px;
      border-top: 0.5pt solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--sans);
      font-style: italic;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: -0.005em;
    }
    .meta .pulse {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>

  <script>

    const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
    const templateError = "/*[|template_error|]*/0",

      rememberExpirationKey: "staticrypt_expiration",

        toggleIcon.alt = templateToggleAltHide;

    document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const password = document.getElementById("staticrypt-password").value,
        isRememberChecked = document.getElementById("staticrypt-remember").checked;
      const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
      if (!isSuccessful) {
        const err = document.getElementById("staticrypt-error");
        err.textContent = templateError;
        const input = document.getElementById("staticrypt-password");
        input.value = "";
